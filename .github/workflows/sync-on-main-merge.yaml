# Regenerates readme / engineering-hubs on `main`, builds the static site from this
# branch, then force-pushes **only** the published files (HTML + sitemap + robots +
# assets) to branch `live` for GitHub Pages.
#
# Skips when the triggering push was the bot follow-up (`[skip ci]` in the message).
# **Settings → Pages → Branch `live`, folder `/`.**

name: Update Docs and README on Merge

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-main-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_dispatch / schedule: do not use head_commit (often unset → job was skipped).
    # push: skip bot follow-up commits with [skip ci].
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' &&
       !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python and dependencies
        run: uv sync --frozen

      - name: Sync content and deploy site to live
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          run_gen_index() {
            uv run python -m scripts.generate_index
          }

          # Orphan force-push: branch `live` contains only files served by Pages.
          deploy_live() {
            LIVE_MSG="$1"
            SITE="$(mktemp -d)"
            mkdir -p "${SITE}/assets/css" "${SITE}/assets/js"
            cp index.html sitemap.xml robots.txt "${SITE}/"
            cp assets/css/index.css "${SITE}/assets/css/"
            cp assets/js/gtag-init.js assets/js/index.js assets/js/tailwind-config.js "${SITE}/assets/js/"
            cp assets/og-image.png assets/vectorized.svg "${SITE}/assets/"
            (
              cd "${SITE}"
              git init -b live
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git config user.name "github-actions[bot]"
              git add -A
              git commit -m "${LIVE_MSG}"
              git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
              git push --force origin live
            )
            rm -rf "${SITE}"
          }

          if [ "$EVENT_NAME" = "push" ]; then
            uv run python -m scripts.generate_readme
            run_gen_index

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"

            git add readme.md engineering-hubs.md
            MAIN_CHANGED=0
            if git diff --staged --quiet; then
              echo "No main-branch doc changes to commit."
            else
              git commit -m "chore(📚): auto-update docs with fresh content [skip ci]"
              MAIN_CHANGED=1
            fi

            deploy_live "chore: deploy static site from main [skip ci]"

            if [ "$MAIN_CHANGED" -eq 1 ]; then
              git push origin main
            fi
          fi

          if [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            uv run python -m scripts.fetch_workable_counts
            uv run python -m scripts.generate_readme
            run_gen_index

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add readme.md engineering-hubs.md data/workable_counts.yaml
            MAIN_CHANGED=0
            if git diff --staged --quiet; then
              echo "No main-branch changes to commit."
            else
              if [ "$EVENT_NAME" = "schedule" ]; then
                git commit -m "chore: refresh Workable job counts (weekly schedule) [skip ci]"
              else
                git commit -m "chore: refresh Workable job counts (manual) [skip ci]"
              fi
              MAIN_CHANGED=1
            fi

            deploy_live "chore: deploy static site after Workable refresh [skip ci]"

            if [ "$MAIN_CHANGED" -eq 1 ]; then
              git push origin main
            fi
          fi
